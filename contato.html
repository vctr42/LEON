<!DOCTYPE html>
<html lang="pt-br">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Entre em contato com a LEON para orçamentos, dúvidas sobre prevenção de incêndios e agendamentos.">
	<title>Contato | LEON Segurança Contra Incêndios</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="root.css">
	<link rel="stylesheet" href="paginas.css">
    <link rel="stylesheet" href="contato.css">
    <link rel="shortcut icon" href="img/foguin.svg" type="image/x-icon">
</head>
<body>
    <header class="site-header" role="banner">
        <div class="container header-inner">
            <a class="brand" href="index.html" aria-label="Ir para a página inicial">
                <img src="img/LOGO Azul.svg" alt="LEON - logotipo" width="162" height="52">
            </a>

            <nav role="navigation" aria-label="Navegação principal">
                <ul class="nav-list">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="sobre.html">Sobre</a></li>
                    <li><a href="servicos.html">Serviços</a></li>
                    <li><a class="botao_secundario" href="contato.html">Entre em Contato</a></li>
                </ul>
            </nav>
        </div>
    </header>

	<main class="page-main">
		<section class="page-hero">
            <div class="container hero-inner">
                <h1><span>Entre em Contato</span>Fale Conosco</h1>
			    <p>Estamos prontos para atender sua empresa com soluções inteligentes em engenharia de segurança.</p>
            </div>
		</section>

		<section class="contact-form-section">
            <div class="container">
			    <form class="contact-form" action="#" method="post" aria-label="Formulário de contato">
				    <div class="form-row">
					    <label for="nome">Nome Completo</label>
					    <input id="nome" name="nome" type="text" required autocomplete="name" placeholder="Digite seu nome">
				    </div>

				    <div class="form-row">
					    <label for="email">E-mail Corporativo</label>
					    <input id="email" name="email" type="email" required autocomplete="email" placeholder="email@empresa.com">
				    </div>

				    <div class="form-row">
					    <label for="assunto">Assunto</label>
					    <input id="assunto" name="assunto" type="text" placeholder="Sobre o que deseja falar?">
				    </div>

				    <div class="form-row">
					    <label for="mensagem">Mensagem</label>
					    <textarea id="mensagem" name="mensagem" rows="6" required placeholder="Escreva aqui os detalhes da sua necessidade..."></textarea>
				    </div>

				    <div class="form-actions">
					    <button type="submit" class="botao_primario">Enviar Mensagem</button>
					    <button type="reset" class="botao_secundario">Limpar Formulário</button>
				    </div>
			    </form>
            </div>
		</section>
	</main>

            <footer class="site-footer" role="contentinfo">
        <div class="container footer-inner">
            <div class="footer-brand">
                <img src="img/LOGO Clara.svg" alt="LEON logo" width="162" height="52">
            </div>

            <nav class="footer-nav" aria-label="Rodapé - navegação">
                <a href="index.html">Home</a>
                <a href="sobre.html">Sobre</a>
                <a href="servicos.html">Serviços</a>
                <a href="contato.html">Contato</a>
                <a href="orcamento.html">Orçamento</a>
            </nav>

            <div class="footer-bottom-bar">
                <div class="footer-copy">
                    <p>LEON - CNPJ: &copy; <span id="year">2026</span> Todos os direitos reservados.</p>
                </div>
                <div class="footer-dev">
                    <span>Desenvolvido por: <a href="https://github.com/vctr42" target="_blank">@vctr42</a></span>
                    <div class="dev-socials">
                        <a class="social" href="https://github.com/vctr42" target="_blank" aria-label="GitHub">

                        </a>
                        <a class="social" href="https://www.linkedin.com/in/victor-da-silva-gois/" target="_blank" aria-label="LinkedIn">

            </div>
        </div>
        <script>document.getElementById('year').textContent = new Date().getFullYear();</script>

</body>
